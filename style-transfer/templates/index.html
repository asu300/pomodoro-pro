<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 风格迁移</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--card:#161b22;--card2:#1c2333;--border:#30363d;--accent:#58a6ff;--accent2:#1f6feb;--green:#3fb950;--red:#f85149;--orange:#d29922;--text:#e6edf3;--text2:#8b949e;--text3:#484f58}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:20px}

/* Header */
.header{text-align:center;padding:32px 0 24px;border-bottom:1px solid var(--border);margin-bottom:24px}
.header h1{font-size:28px;font-weight:700;background:linear-gradient(135deg,var(--accent),#a371f7,#f778ba);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.header p{color:var(--text2);font-size:14px}

/* Mode Tabs */
.mode-tabs{display:flex;gap:8px;justify-content:center;margin-bottom:28px}
.mode-tab{padding:8px 24px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:14px;transition:.3s}
.mode-tab.active{background:var(--accent2);border-color:var(--accent2);color:#fff}
.mode-tab:hover:not(.active){border-color:var(--text2)}

/* Grid Layout */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
@media(max-width:720px){.grid{grid-template-columns:1fr}}

/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;position:relative}
.card h3{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card h3 .badge{font-size:11px;background:var(--accent2);color:#fff;padding:2px 8px;border-radius:10px;font-weight:400}

/* Upload Zone */
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:32px 20px;text-align:center;cursor:pointer;transition:.3s;position:relative}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:rgba(88,166,255,.05)}
.upload-zone .icon{font-size:36px;margin-bottom:8px}
.upload-zone .text{color:var(--text2);font-size:13px}
.upload-zone .text b{color:var(--accent)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}

/* Preview Grid */
.preview-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.preview-item{position:relative;width:80px;height:80px;border-radius:8px;overflow:hidden;border:2px solid transparent;cursor:pointer;transition:.2s}
.preview-item.selected{border-color:var(--accent);box-shadow:0 0 0 2px rgba(88,166,255,.3)}
.preview-item img{width:100%;height:100%;object-fit:cover}
.preview-item .remove{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:var(--red);color:#fff;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s}
.preview-item:hover .remove{opacity:1}
.preview-item .check{position:absolute;bottom:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--green);color:#fff;border:none;font-size:11px;display:flex;align-items:center;justify-content:center}

/* Target Preview */
.target-preview{margin-top:12px;text-align:center}
.target-preview img{max-width:100%;max-height:260px;border-radius:8px;border:1px solid var(--border)}

/* Controls */
.controls{display:flex;gap:12px;align-items:center;justify-content:center;margin:20px 0}
.btn{padding:10px 28px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:.2s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent2);color:#fff}
.btn-primary:hover{background:#2770d4}
.btn-primary:disabled{background:var(--text3);cursor:not-allowed}
.btn-secondary{background:var(--card);color:var(--text2);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--text2)}

/* Slider */
.slider-row{display:flex;align-items:center;gap:10px;margin:12px 0;font-size:13px;color:var(--text2)}
.slider-row input[type=range]{flex:1;accent-color:var(--accent)}
.slider-row .val{min-width:36px;text-align:right;color:var(--accent);font-weight:600}

/* Result */
.result-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center;display:none}
.result-section.show{display:block}
.result-section h3{margin-bottom:14px}
.result-section img{max-width:100%;max-height:480px;border-radius:8px;border:1px solid var(--border);margin-bottom:12px}

/* Progress */
.progress-bar{width:100%;height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin:12px 0}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--accent),#a371f7);border-radius:2px;transition:width .3s}

/* Status */
.status{text-align:center;padding:12px;font-size:13px;color:var(--text2);min-height:40px}
.status.error{color:var(--red)}
.status.success{color:var(--green)}

/* Train Section */
.train-section{display:none}
.train-section.show{display:block}
.train-section input[type=text]{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;margin-bottom:10px}
.train-section input:focus{border-color:var(--accent)}

/* Loading Spinner */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Footer */
.footer{text-align:center;padding:24px 0;color:var(--text3);font-size:12px;border-top:1px solid var(--border);margin-top:32px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>AI 风格迁移</h1>
    <p>上传画家作品作为风格参考，将你的照片转换为该画风</p>
  </div>

  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="fast">快速模式</button>
    <button class="mode-tab" data-mode="detail">精细模式</button>
    <button class="mode-tab" data-mode="train">LoRA 训练</button>
  </div>

  <div class="grid">
    <!-- Style References -->
    <div class="card">
      <h3>风格参考图 <span class="badge" id="styleCount">0 张</span></h3>
      <div class="upload-zone" id="styleZone">
        <div class="icon"></div>
        <div class="text">拖拽或 <b>点击上传</b> 画家作品</div>
        <div class="text" style="margin-top:4px">支持多张，建议 20-50 张</div>
        <input type="file" id="styleInput" multiple accept="image/*">
      </div>
      <div class="preview-grid" id="stylePreviews"></div>
    </div>

    <!-- Target Photo -->
    <div class="card">
      <h3>目标照片</h3>
      <div class="upload-zone" id="targetZone">
        <div class="icon"></div>
        <div class="text">拖拽或 <b>点击上传</b> 要转换的照片</div>
        <input type="file" id="targetInput" accept="image/*">
      </div>
      <div class="target-preview" id="targetPreview"></div>
    </div>
  </div>

  <!-- Strength Slider -->
  <div class="card" style="max-width:600px;margin:0 auto 20px">
    <div class="slider-row">
      <span>风格强度</span>
      <input type="range" min="10" max="100" value="65" id="strengthSlider">
      <span class="val" id="strengthVal">65%</span>
    </div>
  </div>

  <!-- Train Options (hidden by default) -->
  <div class="card train-section" id="trainSection" style="max-width:600px;margin:0 auto 20px">
    <h3>LoRA 训练参数</h3>
    <label style="font-size:13px;color:var(--text2)">画家/风格名称</label>
    <input type="text" id="artistName" placeholder="例如：梵高、莫奈、浮世绘...">
    <label style="font-size:13px;color:var(--text2)">触发词 (Trigger Word)</label>
    <input type="text" id="triggerWord" placeholder="例如：vangogh style" value="sks style">
    <div style="font-size:12px;color:var(--text3);margin-top:8px">训练需要至少 5 张参考图，约 15-30 分钟</div>
  </div>

  <!-- Run Button -->
  <div class="controls">
    <button class="btn btn-primary" id="runBtn" disabled>开始风格迁移</button>
    <button class="btn btn-secondary" id="clearBtn">清空</button>
  </div>

  <!-- Status -->
  <div class="status" id="statusBar"></div>

  <!-- Result -->
  <div class="result-section" id="resultSection">
    <h3>转换结果</h3>
    <div class="progress-bar"><div class="fill" id="progressFill" style="width:0"></div></div>
    <img id="resultImg" src="" alt="结果">
    <div>
      <a id="downloadBtn" class="btn btn-primary" download="style-transfer-result.png">下载结果</a>
    </div>
  </div>

  <div class="footer">
    AI 风格迁移工具 · 基于 Replicate API · Stable Diffusion
  </div>
</div>

<script>
// ===== State =====
let styleFiles = [];  // {id, url, thumb}
let targetFile = null; // {id, url}
let currentMode = 'fast';

// ===== Elements =====
const el = id => document.getElementById(id);

// ===== Mode Tabs =====
document.querySelectorAll('.mode-tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.mode-tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    currentMode = t.dataset.mode;
    el('trainSection').classList.toggle('show', currentMode === 'train');
    updateRunBtn();
  });
});

// ===== Strength Slider =====
el('strengthSlider').addEventListener('input', () => {
  el('strengthVal').textContent = el('strengthSlider').value + '%';
});

// ===== File Upload =====
function setupUpload(zoneId, inputId, callback, multiple) {
  const zone = el(zoneId);
  const input = el(inputId);

  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragover');
    handleFiles(e.dataTransfer.files, callback);
  });
  input.addEventListener('change', () => {
    handleFiles(input.files, callback);
    input.value = '';
  });
}

async function handleFiles(files, callback) {
  if (!files.length) return;
  const formData = new FormData();
  for (const f of files) formData.append('files', f);
  formData.append('category', 'style');

  setStatus('上传中...', false);
  try {
    const res = await fetch('/api/upload', { method: 'POST', body: formData });
    const data = await res.json();
    if (data.ok) {
      callback(data.files);
      setStatus(`已上传 ${data.files.length} 张`, false);
    } else {
      setStatus(data.error, true);
    }
  } catch (e) {
    setStatus('上传失败: ' + e.message, true);
  }
}

// Style uploads
setupUpload('styleZone', 'styleInput', files => {
  styleFiles.push(...files);
  renderStylePreviews();
  updateRunBtn();
}, true);

// Target upload
setupUpload('targetZone', 'targetInput', files => {
  if (files.length) {
    targetFile = files[0];
    el('targetPreview').innerHTML = `<img src="${targetFile.url}" alt="目标照片">`;
    updateRunBtn();
  }
}, false);

// ===== Render Previews =====
function renderStylePreviews() {
  el('stylePreviews').innerHTML = styleFiles.map((f, i) => `
    <div class="preview-item selected" data-id="${f.id}">
      <img src="${f.thumb || f.url}" alt="">
      <button class="remove" onclick="removeStyle('${f.id}')">✕</button>
      <div class="check">✓</div>
    </div>
  `).join('');
  el('styleCount').textContent = styleFiles.length + ' 张';
}

function removeStyle(id) {
  fetch(`/api/delete/${id}`, { method: 'DELETE' });
  styleFiles = styleFiles.filter(f => f.id !== id);
  renderStylePreviews();
  updateRunBtn();
}

function updateRunBtn() {
  const hasStyles = styleFiles.length > 0;
  const hasTarget = targetFile !== null;
  const needsMin5 = currentMode === 'train' && styleFiles.length < 5;
  el('runBtn').disabled = !hasStyles || !hasTarget || needsMin5;
}

// ===== Status =====
function setStatus(msg, isError) {
  el('statusBar').className = 'status' + (isError ? ' error' : '');
  el('statusBar').innerHTML = isError ? msg : (msg ? `<span class="spinner"></span>${msg}` : '');
}

// ===== Run Transfer =====
el('runBtn').addEventListener('click', async () => {
  if (currentMode === 'train') {
    await runTrain();
  } else {
    await runTransfer();
  }
});

async function runTransfer() {
  const btn = el('runBtn');
  btn.disabled = true;
  setStatus('正在风格迁移，请稍候...', false);
  el('resultSection').classList.add('show');
  el('progressFill').style.width = '10%';

  // Animate progress
  let progress = 10;
  const progressInterval = setInterval(() => {
    progress = Math.min(progress + Math.random() * 5, 90);
    el('progressFill').style.width = progress + '%';
  }, 2000);

  try {
    const res = await fetch('/api/transfer', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        style_ids: styleFiles.map(f => f.id),
        target_id: targetFile.id,
        mode: currentMode,
        strength: el('strengthSlider').value / 100,
      }),
    });
    const data = await res.json();
    clearInterval(progressInterval);

    if (data.ok) {
      el('progressFill').style.width = '100%';
      el('resultImg').src = data.result;
      el('downloadBtn').href = data.result;
      setStatus('风格迁移完成！', false);
      el('statusBar').className = 'status success';
      el('statusBar').textContent = '✓ 风格迁移完成！';
    } else {
      el('resultSection').classList.remove('show');
      setStatus(data.error, true);
    }
  } catch (e) {
    clearInterval(progressInterval);
    el('resultSection').classList.remove('show');
    setStatus('请求失败: ' + e.message, true);
  }
  btn.disabled = false;
}

async function runTrain() {
  const btn = el('runBtn');
  btn.disabled = true;
  setStatus('正在启动 LoRA 训练...', false);

  try {
    const res = await fetch('/api/train', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        style_ids: styleFiles.map(f => f.id),
        artist_name: el('artistName').value || 'custom',
        trigger_word: el('triggerWord').value || 'sks style',
      }),
    });
    const data = await res.json();

    if (data.ok) {
      setStatus(data.message, false);
      el('statusBar').className = 'status success';
      // Poll for status
      pollTraining(data.training_id);
    } else {
      setStatus(data.error, true);
    }
  } catch (e) {
    setStatus('训练启动失败: ' + e.message, true);
  }
  btn.disabled = false;
}

async function pollTraining(id) {
  const interval = setInterval(async () => {
    try {
      const res = await fetch(`/api/train/status/${id}`);
      const data = await res.json();
      if (data.ok) {
        if (data.status === 'succeeded') {
          clearInterval(interval);
          el('statusBar').className = 'status success';
          el('statusBar').textContent = '✓ ' + data.message;
        } else if (data.status === 'failed') {
          clearInterval(interval);
          setStatus(data.message, true);
        } else {
          setStatus(data.message, false);
        }
      }
    } catch (e) {
      clearInterval(interval);
      setStatus('查询训练状态失败', true);
    }
  }, 10000);
}

// ===== Clear =====
el('clearBtn').addEventListener('click', () => {
  styleFiles.forEach(f => fetch(`/api/delete/${f.id}`, { method: 'DELETE' }));
  if (targetFile) fetch(`/api/delete/${targetFile.id}`, { method: 'DELETE' });
  styleFiles = [];
  targetFile = null;
  el('stylePreviews').innerHTML = '';
  el('targetPreview').innerHTML = '';
  el('styleCount').textContent = '0 张';
  el('resultSection').classList.remove('show');
  setStatus('', false);
  updateRunBtn();
});
</script>
</body>
</html>
